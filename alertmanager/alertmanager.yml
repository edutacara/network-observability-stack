---
route:
  receiver: default
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity = "critical"
      receiver: default
      repeat_interval: 1h

receivers:
  # Placeholder receiver: replace with your Slack/Teams/e-mail integration.
  # Example for Slack:
  #   slack_configs:
  #     - api_url: https://hooks.slack.com/services/XXX/YYY/ZZZ
  #       channel: '#network-alerts'
  - name: default
