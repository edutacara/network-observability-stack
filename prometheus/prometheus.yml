---
global:
  scrape_interval: 60s
  evaluation_interval: 60s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # SNMP polling via snmp-exporter (IF-MIB: traffic, errors, oper status)
  - job_name: snmp-network-devices
    metrics_path: /snmp
    params:
      auth: [public_v2]
      module: [if_mib]
    static_configs:
      - targets:
          - ceos1
          - ceos2
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # BGP4-MIB — peer FSM state and message counters (RFC 4273)
  - job_name: snmp-bgp
    metrics_path: /snmp
    params:
      auth: [public_v2]
      module: [bgp4_mib]
    static_configs:
      - targets:
          - ceos1
          - ceos2
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # OSPF-MIB — neighbor adjacency states (RFC 1850)
  - job_name: snmp-ospf
    metrics_path: /snmp
    params:
      auth: [public_v2]
      module: [ospf_mib]
    static_configs:
      - targets:
          - ceos1
          - ceos2
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # gNMI streaming telemetry via gnmic (interfaces, CPU, memória, BGP, plataforma)
  - job_name: gnmi
    static_configs:
      - targets:
          - gnmic:9804

  # Health of the exporter itself
  - job_name: snmp-exporter
    static_configs:
      - targets:
          - snmp-exporter:9116
