---
global:
  scrape_interval: 60s
  evaluation_interval: 60s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # SNMP polling of network devices via snmp-exporter.
  # Each target below is a network device; the exporter does the SNMP
  # walk on Prometheus' behalf (the classic relabel_configs dance).
  - job_name: snmp-network-devices
    metrics_path: /snmp
    params:
      auth: [public_v2]   # SNMP community defined in the exporter's snmp.yml
      module: [if_mib]    # interface metrics (ifTable / ifXTable)
    static_configs:
      - targets:
          - 192.0.2.11    # rtr-core-01 (replace with your devices)
          - 192.0.2.12    # rtr-core-02
          - 192.0.2.31    # mx-edge-01
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # Health of the exporter itself
  - job_name: snmp-exporter
    static_configs:
      - targets:
          - snmp-exporter:9116
