---
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring

  ceos1:
    image: ceos:4.36.1F
    container_name: ceos1
    privileged: true
    ports:
      - "2222:22"
    environment:
      CEOS: "1"
      EOS_PLATFORM: ceoslab
      container: docker
      INTFTYPE: eth
      ETBA: "1"
      SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT: "1"
      MGMT_INTF: eth0
    volumes:
      - ./ceos/startup-config:/mnt/flash/startup-config:ro
      - ./ceos/entrypoint.sh:/ceos-entrypoint.sh:ro
    command:
      - /bin/bash
      - /ceos-entrypoint.sh
      - systemd.setenv=INTFTYPE=eth
      - systemd.setenv=ETBA=1
      - systemd.setenv=SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT=1
      - systemd.setenv=CEOS=1
      - systemd.setenv=EOS_PLATFORM=ceoslab
      - systemd.setenv=container=docker
      - systemd.setenv=MGMT_INTF=eth0
    networks:
      monitoring:
        ipv4_address: 172.20.0.10
      peering:
        ipv4_address: 10.0.0.2

  ceos2:
    image: ceos:4.36.1F
    container_name: ceos2
    privileged: true
    ports:
      - "2223:22"
    environment:
      CEOS: "1"
      EOS_PLATFORM: ceoslab
      container: docker
      INTFTYPE: eth
      ETBA: "1"
      SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT: "1"
      MGMT_INTF: eth0
    volumes:
      - ./ceos/startup-config-ceos2:/mnt/flash/startup-config:ro
      - ./ceos/entrypoint.sh:/ceos-entrypoint.sh:ro
    command:
      - /bin/bash
      - /ceos-entrypoint.sh
      - systemd.setenv=INTFTYPE=eth
      - systemd.setenv=ETBA=1
      - systemd.setenv=SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT=1
      - systemd.setenv=CEOS=1
      - systemd.setenv=EOS_PLATFORM=ceoslab
      - systemd.setenv=container=docker
      - systemd.setenv=MGMT_INTF=eth0
    networks:
      monitoring:
        ipv4_address: 172.20.0.20
      peering:
        ipv4_address: 10.0.0.3

  gnmic:
    image: ghcr.io/openconfig/gnmic:0.38.2
    container_name: gnmic
    restart: unless-stopped
    volumes:
      - ./gnmic/gnmic.yml:/app/gnmic.yml:ro
    command: subscribe --config /app/gnmic.yml
    ports:
      - "9804:9804"
    networks:
      - monitoring
    depends_on:
      - ceos1
      - ceos2

  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp-exporter
    restart: unless-stopped
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  peering:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/29

volumes:
  prometheus-data:
  grafana-data:
